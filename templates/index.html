<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Chatbot - To-Do List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📝 Study Chatbot - To-Do List</h1>
        
        <div class="input-section">
            <form id="taskForm" method="POST" action="/add">
                <input 
                    type="text" 
                    id="taskInput" 
                    name="task" 
                    placeholder="Add a new task (e.g., Make tea)" 
                    required
                >
                <button type="submit">Add Task</button>
            </form>
        </div>

        <div class="tasks-section">
            <h2>Your Tasks:</h2>
            <ul id="taskList" class="task-list">
                {% for task in tasks %}
                <li class="task-item">
                    <span class="task-text">{{ task.task }}</span>
                    <form method="POST" action="/delete/{{ loop.index0 }}" style="display:inline;">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
